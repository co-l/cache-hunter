<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Tree Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="container">
    <div id="grid-wrapper">
      <div id="loading">Loading...</div>
    </div>
    <div id="status-bar"></div>
  </div>

  <div id="modal">
    <div id="modal-content">
      <div id="modal-header">
        <span id="modal-hash"></span>
        <button id="modal-close">&times;</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="diff-panel">
    <div id="diff-content">
      <div id="diff-header">
        <span id="diff-title"></span>
        <button id="diff-close">&times;</button>
      </div>
      <div id="diff-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
