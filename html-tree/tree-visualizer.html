<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tree Visualizer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #ffffff;
      font-family: monospace;
      font-size: 10px;
    }

    .container {
      width: 100vw;
      height: 100vh;
      overflow: auto;
    }

    .grid {
      display: grid;
      border-collapse: collapse;
    }

    .cell {
      min-width: 4ch;
      padding: 2px 4px;
      text-align: center;
      border: 1px solid #1a1a1a;
    }

    .header-row {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #0a0a0a;
    }

    .header-cell {
      background: #e67e00;
      color: #0a0a0a;
      font-weight: bold;
    }

    .hash-cell {
      background: #1a1a1a;
    }

    .right-column {
      position: sticky;
      right: 0;
      width: 50ch;
      min-width: 40ch;
      text-align: left;
      background: #1a1a1a;
      border-left: 2px solid #e67e00;
      z-index: 5;
    }

    .right-column.header-cell {
      background: #e67e00;
    }

    .right-column.hash-cell {
      background: #0f0f0f;
    }

    .ansi-0 { color: #000000; }
    .ansi-1 { color: #cd3131; }
    .ansi-2 { color: #0dbc79; }
    .ansi-3 { color: #e5e510; }
    .ansi-4 { color: #2472c8; }
    .ansi-5 { color: #bc3fbc; }
    .ansi-6 { color: #2aa198; }
    .ansi-7 { color: #e5e5e5; }
    .ansi-8 { color: #666666; }
    .ansi-9 { color: #f14c4c; }
    .ansi-10 { color: #23d18b; }
    .ansi-11 { color: #f5f543; }
    .ansi-12 { color: #3b8eea; }
    .ansi-13 { color: #d670d6; }
    .ansi-14 { color: #29b8db; }
    .ansi-15 { color: #e5e5e5; }
  </style>
</head>
<body>
  <div class="container">
    <div class="grid" id="grid"></div>
  </div>

  <script>
    async function loadAndRender() {
      const response = await fetch('tree-data.json');
      const data = await response.json();
      
      const { lines, hash_map } = data;
      const grid = document.getElementById('grid');
      
      grid.style.gridTemplateColumns = `repeat(${lines[0].length}, minmax(4ch, auto))`;
      
      lines.forEach((row, rowIndex) => {
        row.forEach((cell, colIndex) => {
          const cellEl = document.createElement('div');
          cellEl.className = 'cell';
          
          if (rowIndex === 0) {
            cellEl.classList.add('header-cell', 'header-row');
          }
          
          if (colIndex === row.length - 1) {
            cellEl.classList.add('right-column');
          }
          
          let content = cell;
          
          if (rowIndex > 0) {
            const cleanHash = cell.replace(/\u001b\[\d+m/g, '');
            const fullText = hash_map[cleanHash] || '';
            
            if (colIndex === row.length - 1) {
              content = fullText.length > 40 ? fullText.substring(0, 40) + '...' : fullText;
            } else {
              content = parseAnsi(cell);
            }
          }
          
          cellEl.innerHTML = content;
          grid.appendChild(cellEl);
        });
      });
    }

    function parseAnsi(text) {
      const ansiRegex = /\u001b\[(\d+)m/g;
      const matches = [];
      let match;
      
      while ((match = ansiRegex.exec(text)) !== null) {
        matches.push({
          index: match.index,
          code: match[1],
          length: match[0].length
        });
      }
      
      if (matches.length === 0) return text;
      
      let result = '';
      let lastIndex = 0;
      let currentColor = null;
      
      for (const m of matches) {
        result += text.substring(lastIndex, m.index);
        
        if (m.code === '0') {
          if (currentColor !== null) {
            result += '</span>';
            currentColor = null;
          }
        } else {
          if (currentColor !== null) {
            result += '</span>';
          }
          result += `<span class="ansi-${m.code}">`;
          currentColor = m.code;
        }
        
        lastIndex = m.index + m.length;
      }
      
      result += text.substring(lastIndex);
      
      if (currentColor !== null) {
        result += '</span>';
      }
      
      return result;
    }

    loadAndRender();
  </script>
</body>
</html>
